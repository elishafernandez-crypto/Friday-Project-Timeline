<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fridays x Rubricore Project Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Calibri,Carlito,'Segoe UI',sans-serif;font-size:12px;background:#ffffff;color:#000;min-height:100vh}

/* ── HEADER ── */
.page-header{background:#0D4B3B;color:#fff;padding:14px 24px 0;display:flex;flex-direction:column;gap:4px}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header-eyebrow{font-family:'Segoe UI','Open Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#CD9ACD;margin-bottom:3px}
.header-title{font-size:22px;font-weight:700;letter-spacing:-.3px;font-family:'Segoe UI','Open Sans',sans-serif;color:#fff;line-height:1.1;word-break:break-word}
.tab-nav{display:flex;gap:0;margin-top:12px}
.tab-btn{padding:8px 20px;border:none;border-radius:0;background:transparent;color:rgba(255,255,255,.65);font-family:'Segoe UI','Open Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:color .16s,border-bottom .16s;border-bottom:3px solid transparent}
.tab-btn:hover{color:#fff;border-bottom:3px solid rgba(255,255,255,.35)}
.tab-btn.active{color:#fff;border-bottom:3px solid #CD9ACD;font-weight:700}
.btn-addnote{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.28);color:rgba(255,255,255,.9);font-family:'Segoe UI','Open Sans',sans-serif;font-size:11px;padding:6px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:background .16s}
.btn-addnote:hover{background:rgba(255,255,255,.22)}

/* Views */
.view{display:none}
.view.active{display:block}

/* Calendar */
.calendar-wrap{padding:4px 0 24px}
.section-label{background:transparent;color:#CD9ACD;font-family:'Segoe UI','Open Sans',sans-serif;font-size:10px;font-weight:700;padding:14px 20px 6px;letter-spacing:.12em;text-transform:uppercase;border:none}

/* Calendar global header */
.cal-global-hdr{background:#fff;position:sticky;top:0;z-index:20;border-bottom:2px solid #E5E9E7;margin:0 16px}
.cal-day-name-hdr{display:flex;align-items:center;justify-content:center;padding:8px 4px;border-right:1px solid #E5E9E7;background:#fff;height:36px}
.cal-day-name-hdr.is-weekend{background:#F5EDE0}
.cal-day-name-hdr.is-today{background:#D4E3DD}
.cal-day-name-hdr .dname{font-size:11px;color:#0D4B3B;font-weight:700;text-transform:uppercase;letter-spacing:.5px;font-family:'Segoe UI','Open Sans',sans-serif}

/* Grid: WS(80px) Mon-Fri(1fr each) Sat,Sun(0.65fr) Remarks(200px) */
.GRID{display:grid;grid-template-columns:80px 1fr 1fr 1fr 1fr 1fr 0.65fr 0.65fr 200px}

/* Week card container */
.week-card{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #E5E9E7;margin:0 16px 12px;box-shadow:0 2px 6px rgba(11,75,59,.06),0 1px 2px rgba(11,75,59,.04);transition:box-shadow .16s}
.week-card:hover{box-shadow:0 8px 20px rgba(11,75,59,.08),0 2px 6px rgba(11,75,59,.04)}

.ws-cell{min-width:80px;width:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid #E5E9E7;padding:4px 0;background:#DBEAF4}
.ws-label{font-size:8px;font-weight:700;color:#589992;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.ws-date{font-size:10px;font-weight:700;color:#0D4B3B;font-family:'Segoe UI','Open Sans',sans-serif;text-align:center;word-break:break-word;line-height:1.2}

/* Header row cells — day name + date, no repeat in body */
.day-header-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px;border-right:1px solid #E5E9E7;background:#fff;gap:3px;border-bottom:1px solid #E5E9E7}
.day-header-cell.is-today{background:#D4E3DD;border-bottom:2px solid #0D4B3B !important}
.dname{font-size:13px;color:#0D4B3B;font-weight:700;text-transform:uppercase;letter-spacing:.5px;font-family:'Segoe UI','Open Sans',sans-serif}
.dnum{font-size:10px;font-weight:500;color:#589992;font-family:Calibri,Carlito,'Segoe UI',sans-serif;line-height:1}
.day-header-cell.is-today .dname{color:#0D4B3B}
.day-header-cell.is-today .dnum{color:#0D4B3B;font-weight:700}
.mini-hdr-cell{padding:7px 4px;border-bottom:1px solid #E5E9E7;background:#fff}
.mini-hdr-cell .dnum{font-size:11px;font-weight:600;color:#0D4B3B}
.remarks-hdr{display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#589992;letter-spacing:.1em;text-transform:uppercase;background:#ECF3F8;border-left:1px solid #E5E9E7}

/* Featured week */
.feat-day-cell{height:110px;border-right:1px solid #E5E9E7;cursor:pointer;position:relative;overflow:hidden;background:#fff;transition:background .12s}
.feat-day-cell:hover{background:#ECF3F8 !important}
.feat-day-cell.is-today{background:#D4E3DD !important}
.feat-day-cell.is-weekend{background:#F5EDE0}
.feat-remarks-cell{height:130px;border-left:1px solid #E5E9E7;background:#ECF3F8;cursor:default}
.feat-remarks-cell textarea{width:100%;height:100%;border:none;background:transparent;font-family:Calibri,Carlito,'Segoe UI',sans-serif;font-size:11px;resize:none;padding:8px;outline:none;color:#000}
.feat-lanes{position:relative;overflow:hidden;background:#fff}

/* Mini week rows */
.mini-row{position:relative}
.mini-day-cell{height:130px;border-right:1px solid #E5E9E7;cursor:pointer;position:relative;overflow:hidden;background:#fff;transition:background .12s}
.mini-day-cell:hover{background:#ECF3F8 !important}
.mini-day-cell.is-today{background:#D4E3DD !important}
.mini-day-cell.is-weekend{background:#F5EDE0}
.mini-day-cell.is-past{background:#f7f7f7}
.mini-remarks-cell{height:130px;border-left:1px solid #E5E9E7;background:#ECF3F8;cursor:default}
.mini-remarks-cell textarea{width:100%;height:100%;border:none;background:transparent;font-family:Calibri,Carlito,'Segoe UI',sans-serif;font-size:11px;resize:none;padding:6px 8px;outline:none;color:#000}
.past-section .week-card{opacity:1}
.past-section .mini-day-cell{background:#f7f7f7 !important}
.past-section .mini-remarks-cell{background:#f5f5f5 !important}
.past-section .ws-cell{background:#eef0ef !important}
.past-section .cell-date{color:#bbb !important}
.past-section .week-card{border-color:#ececec;box-shadow:none}

/* Cell date number */
.cell-date{position:absolute;top:5px;left:7px;font-size:10px;font-weight:600;color:#589992;font-family:'Segoe UI','Open Sans',sans-serif;line-height:1;pointer-events:none}
.mini-day-cell.is-today .cell-date{color:#0D4B3B;font-weight:700}
.mini-day-cell.is-past .cell-date{color:#aaa}

/* Task bars */
.task-bar{position:absolute;border-radius:6px;display:flex;align-items:center;padding:3px 8px;font-size:11px;font-weight:600;color:#fff;cursor:pointer;white-space:normal;word-break:break-word;overflow:hidden;box-shadow:0 1px 4px rgba(11,75,59,.15);letter-spacing:.1px}
.task-bar:hover{opacity:.85}
.mini-bar{position:absolute;min-height:20px;max-height:34px;border-radius:4px;display:flex;align-items:flex-start;padding:3px 6px;font-size:11px;font-weight:600;color:#fff;white-space:normal;word-break:break-word;overflow:hidden;font-family:'Segoe UI','Open Sans',sans-serif;letter-spacing:.1px;cursor:pointer;line-height:1.3}

.mini-day-cell.drag-over{background:#DBEAF4 !important;outline:2px dashed #589992;outline-offset:-2px}
.mini-bar[draggable]{cursor:grab}.mini-bar[draggable]:active{cursor:grabbing;opacity:.6}
.task-color-picker{position:absolute;left:0;top:18px;background:#fff;border:1px solid #ddd;border-radius:8px;padding:6px 8px;display:flex;gap:6px;z-index:300;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.color-dot{cursor:pointer;position:relative}
.color-dot:hover{transform:scale(1.25)}

/* Floating notes */
.notes-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;bottom:0}
.float-note{position:absolute;pointer-events:all;border-radius:8px;box-shadow:0 4px 20px rgba(11,75,59,.14);min-width:180px;min-height:100px;display:flex;flex-direction:column;overflow:hidden}
.note-handle{display:flex;align-items:center;gap:5px;padding:5px 8px;cursor:grab;user-select:none}
.note-handle:active{cursor:grabbing}
.note-swatch{width:14px;height:14px;border-radius:50%;cursor:pointer;flex-shrink:0}
.note-close{margin-left:auto;background:none;border:none;cursor:pointer;font-size:15px;color:#555;line-height:1}
.note-body{flex:1;border:none;resize:none;font-family:Calibri,Carlito,'Segoe UI',sans-serif;font-size:13px;padding:8px;background:transparent;outline:none;color:#333}
.note-grip{width:14px;height:14px;background:rgba(11,75,59,.12);position:absolute;bottom:0;right:0;cursor:se-resize;border-radius:3px 0 0 0}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:440px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 18px 40px rgba(11,75,59,.10),0 4px 10px rgba(11,75,59,.05);border-top:3px solid #0D4B3B}
.modal-hdr{background:#0D4B3B;color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
.modal-hdr h3{font-size:14px;font-weight:700;font-family:'Segoe UI','Open Sans',sans-serif}
.modal-x{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1}
.modal-body{padding:14px;overflow-y:auto;flex:1}
.section-hdr4{font-size:10px;font-weight:700;color:#589992;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.task-row{display:flex;align-items:flex-start;gap:8px;padding:7px;background:#ECF3F8;border-radius:6px;margin-bottom:5px}
.task-row .color-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px}
.editable-field{border:1px solid transparent;background:transparent;font-family:Calibri,Carlito,'Segoe UI',sans-serif;font-size:11px;color:#000;padding:2px 4px;border-radius:4px;outline:none}
.editable-field:hover{background:#DBEAF4;border-color:#c5d8e2}
.editable-field:focus{background:#DBEAF4;border-color:#0D4B3B}
.task-row .name-field{flex:1}
.task-row .owner-field{width:90px;font-size:10px;color:#589992}
.del-btn{background:none;border:none;cursor:pointer;color:#c66;font-size:13px;line-height:1;padding:0 2px}
.no-tasks-msg{color:#aaa;font-size:11px;font-style:italic;text-align:center;padding:12px 0}
.add-area{display:flex;flex-direction:column;gap:8px;border-top:1px solid #E5E9E7;padding-top:12px;margin-top:8px}
.add-area input{width:100%;border:1px solid #E5E9E7;border-radius:6px;padding:7px 10px;font-family:Calibri,Carlito,'Segoe UI',sans-serif;font-size:11px;outline:none}
.add-area input:focus{border-color:#0D4B3B}
.add-row2{display:flex;gap:8px;align-items:center}
.color-picker{display:flex;gap:4px}
.cpick{width:16px;height:16px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .1s}
.cpick.sel{border-color:#333;transform:scale(1.2)}
.btn-add{background:#0D4B3B;color:#fff;border:none;border-radius:999px;padding:10px 22px;font-family:'Segoe UI','Open Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;min-width:64px;letter-spacing:.02em}
.btn-add:hover{background:#083A2E}
.btn-add:active{background:#062e23;transform:scale(.97)}

/* Gantt */
.gantt-wrap{overflow:auto;background:#fff;padding:16px}
.gantt-table{border-collapse:collapse;min-width:max-content;border-radius:12px;overflow:hidden}
.gantt-table th{background:#0D4B3B;color:#fff;font-size:10px;font-weight:700;padding:6px 8px;white-space:nowrap;position:sticky;top:0;z-index:10;font-family:'Segoe UI','Open Sans',sans-serif;letter-spacing:.3px}
.gantt-table td{border:1px solid #E5E9E7;vertical-align:middle;padding:5px 7px;font-size:12px;word-break:break-word}
.th-task{position:sticky;left:0;z-index:15 !important;background:#0D4B3B !important;min-width:200px}
.th-owner{position:sticky;left:200px;z-index:15 !important;background:#0D4B3B !important;min-width:120px}
.th-status{position:sticky;left:320px;z-index:15 !important;background:#0D4B3B !important;min-width:130px}
.td-task{min-width:200px;max-width:200px;word-wrap:break-word;white-space:normal;position:sticky;left:0;background:#fff;z-index:5;border-right:2px solid #c5d8e2;font-weight:500}
.td-owner{min-width:120px;max-width:120px;position:sticky;left:200px;background:#fff;z-index:5;color:#666;font-size:12px}
.td-status{min-width:130px;max-width:130px;position:sticky;left:320px;background:#fff;z-index:5;border-right:2px solid #c5d8e2}
.td-day{width:20px;min-width:20px;max-width:20px;padding:2px;position:relative}
.gantt-bar{height:18px;border-radius:3px;position:absolute;top:3px;left:1px;right:1px}
.td-remarks textarea{width:100%;border:none;background:transparent;font-family:Calibri,Carlito,'Segoe UI',sans-serif;font-size:12px;resize:vertical;outline:none;color:#333;min-height:40px;min-width:180px}
.month-th{text-align:center;font-size:10px;font-weight:700;background:#DBEAF4 !important;color:#0D4B3B !important;border-bottom:2px solid #0D4B3B !important}
.day-num-th{text-align:center;font-size:8px;padding:3px 0 !important;background:#ECF3F8 !important;color:#0D4B3B !important}
.day-dn-th{text-align:center;font-size:7px;padding:2px 0 !important;background:#ECF3F8 !important;color:#589992 !important;font-weight:700;letter-spacing:.3px}
.col-weekend{background:#F7EFE4 !important}
.col-today{background:#D4E3DD !important}
.status-sel{width:100%;border:1px solid #E5E9E7;border-radius:5px;padding:3px 5px;font-family:'Segoe UI','Open Sans',sans-serif;font-size:10px;font-weight:600;background:#fff;cursor:pointer;outline:none}
.s-notstarted{background:#f5f5f5;color:#888;border-color:#ddd}
.s-inprogress{background:#EEF0FF;color:#5865F2;border-color:#c5c8f5}
.s-completed{background:#D4E3DD;color:#0D4B3B;border-color:#a8c8bc}
.s-delayed{background:#F7EED1;color:#8a5f0d;border-color:#e5d08a}

/* Checklist */
.checklist-wrap{padding:16px;max-width:900px;margin:0 auto}
.cl-title-input{width:100%;border:none;background:transparent;font-family:'Segoe UI','Open Sans',sans-serif;font-size:20px;font-weight:700;color:#0D4B3B;outline:none;margin-bottom:16px;padding:4px 0}
.cl-title-input:hover,.cl-title-input:focus{background:#ECF3F8;border-radius:6px;padding:4px 8px}
.cl-progress{background:#ECF3F8;border-radius:12px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;border:1px solid #E5E9E7}
.progress-outer{flex:1;background:#c5d8e2;border-radius:99px;height:7px}
.progress-inner{background:#0D4B3B;height:7px;border-radius:99px;transition:width .3s}
.progress-txt{font-size:11px;font-weight:700;color:#0D4B3B;white-space:nowrap;font-family:'Segoe UI','Open Sans',sans-serif}
.cl-section{background:#fff;border-radius:12px;margin-bottom:12px;box-shadow:0 2px 6px rgba(11,75,59,.06),0 1px 2px rgba(11,75,59,.04);overflow:hidden;border:1px solid #E5E9E7;border-top:3px solid #589992}
.cl-sec-hdr{display:flex;align-items:center;gap:8px;background:#fff;padding:10px 14px;border-bottom:1px solid #E5E9E7}
.cl-sec-title{flex:1;border:none;background:transparent;font-family:'Segoe UI','Open Sans',sans-serif;font-size:13px;font-weight:700;color:#0D4B3B;outline:none}
.cl-sec-title:hover,.cl-sec-title:focus{background:#ECF3F8;border-radius:4px;padding:2px 6px}
.btn-del-sec{background:none;border:none;cursor:pointer;color:#c66;font-size:15px;opacity:0;transition:opacity .15s}
.cl-sec-hdr:hover .btn-del-sec{opacity:1}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:7px 14px;border-bottom:1px solid #f0f4f2;transition:background .1s}
.cl-item:hover{background:#ECF3F8}
.cl-item:hover .btn-del-item{opacity:1}
.cl-item.done{background:#f5fdf5}
.cl-item input[type=checkbox]{width:15px;height:15px;accent-color:#0D4B3B;margin-top:2px;flex-shrink:0;cursor:pointer}
.cl-item-text{flex:1;border:none;background:transparent;font-family:Calibri,Carlito,'Segoe UI',sans-serif;font-size:12px;color:#000;resize:none;outline:none;min-height:20px;line-height:1.5;overflow:hidden;word-break:break-word;white-space:pre-wrap}
.cl-item-text:hover,.cl-item-text:focus{background:#ECF3F8;border-radius:4px;padding:2px 6px}
.cl-item.done .cl-item-text{color:#aaa}
.btn-del-item{background:none;border:none;cursor:pointer;color:#c66;font-size:13px;opacity:0;transition:opacity .15s;flex-shrink:0;margin-top:1px}
.btn-add-item{display:flex;align-items:center;gap:6px;padding:7px 14px;color:#589992;font-size:11px;font-weight:600;cursor:pointer;border:none;background:none;font-family:'Segoe UI','Open Sans',sans-serif;width:100%}
.btn-add-item:hover{background:#ECF3F8}
.btn-add-section{display:flex;align-items:center;gap:6px;padding:9px 14px;color:#0D4B3B;font-size:12px;font-weight:700;cursor:pointer;border:2px dashed #589992;background:#DBEAF4;border-radius:10px;font-family:'Segoe UI','Open Sans',sans-serif;width:100%;margin-top:6px;justify-content:center}
.btn-add-section:hover{background:#ECF3F8}


/* Week card accent variants */
.wc-green{border-top:3px solid #0D4B3B !important;box-shadow:0 4px 12px rgba(11,75,59,.10),0 1px 3px rgba(11,75,59,.06) !important}
.wc-teal{border-top:3px solid #589992 !important}
.wc-lav{border-top:3px solid #CD9ACD !important}
</style>
</head>
<body>

<div class="page-header">
  <div class="header-top">
    <div>
      <div class="header-eyebrow">Fridays · Rubricore · Project Timeline</div>
      <div class="header-title">Final activities toward Go Live</div>
    </div>
    <button class="btn-addnote" onclick="addNote()">+ Add text box</button>
  </div>
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchView('calendar')">Calendar View</button>
    <button class="tab-btn" onclick="switchView('gantt')">Gantt View</button>
    <button class="tab-btn" onclick="switchView('checklist')">Go Live Checklist</button>
  </div>
</div>

<div id="view-calendar" class="view active"><div class="calendar-wrap" id="calWrap"></div></div>
<div id="view-gantt"    class="view"><div class="gantt-wrap" id="ganttWrap"></div></div>
<div id="view-checklist" class="view"><div class="checklist-wrap" id="clWrap"></div></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="modal-title">Tasks</h3>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="section-hdr4">Existing tasks</div>
      <div id="modal-list"></div>
      <div class="add-area">
        <input id="task-inp" placeholder="Add a task…"
               onkeydown="if(event.key==='Enter'){event.preventDefault();addTask()}">

        <div class="add-row2">
          <select id="owner-inp" style="flex:1;padding:4px 6px;border:1px solid #ccc;border-radius:6px;font-size:12px;color:#333;background:#fff">
            <option value="">Owner</option>
            <option value="Chad">Chad</option>
            <option value="J">J</option>
            <option value="Josef">Josef</option>
            <option value="Joyce">Joyce</option>
            <option value="Lish">Lish</option>
            <option value="Marj">Marj</option>
            <option value="OE Dev Team">OE Dev Team</option>
            <option value="Osh">Osh</option>
          </select>
          <div class="color-picker" id="cpicker"></div>
          <button class="btn-add" onclick="addTask()">Add</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="notes-layer" id="notesLayer"></div>

<script>
// ── Firebase ────────────────────────────────────────────────────
// Replace these values with your Firebase project config
const firebaseConfig = {
  apiKey: "AIzaSyADemt1ix_VtSk8nfMyIMM4LSQs9p4smIw",
  authDomain: "fridays-project-timeline.firebaseapp.com",
  projectId: "fridays-project-timeline",
  storageBucket: "fridays-project-timeline.firebasestorage.app",
  messagingSenderId: "1045252550475",

  measurementId: "G-6GCF6LDB22"

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── Constants ───────────────────────────────────────────────────
const CHIPS = ['#5865F2','#CD9ACD','#4AA8A8','#0D4B3B','#E8A040'];

// Fractional widths for Mon(0)..Sun(6) — used for bar %

const FRACS_TOTAL = FRACS.reduce((a,b)=>a+b,0); // 6.3

// Date range

const END_DATE   = new Date(2026,7,31); // Aug 31

// ── Date helpers ─────────────────────────────────────────────────
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function parseYMD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function weekMon(d){const r=new Date(d);const day=r.getDay();const off=day===0?-6:1-day;r.setDate(r.getDate()+off);return r}
function sameDay(a,b){return ymd(a)===ymd(b)}
function isWE(d){return d.getDay()===0||d.getDay()===6}
function weekDays(ws){return Array.from({length:7},(_,i)=>addDays(ws,i))}
function wKey(ws){return ymd(ws)}
function dKey(d){return ymd(d)}

function allWeeks(){
  const ws=[];let d=weekMon(START_DATE);
  while(d<=END_DATE){ws.push(new Date(d));d=addDays(d,7);}
  return ws;
}

// ── Firestore ────────────────────────────────────────────────────
function save(){
  _suppress=true;
  db.collection('timeline').doc('data').set({tasks,remarks,notes,ganttMeta,checklist})
    .then(()=>{_suppress=false;})
    .catch(e=>{console.error('Save failed',e);_suppress=false;});
}

db.collection('timeline').doc('data').onSnapshot(snap=>{
  if(_suppress){_suppress=false;return;}
  const d=snap.exists?snap.data():{};
  tasks     = d.tasks     || {};
  remarks   = d.remarks   || {};
  notes     = d.notes     || [];
  ganttMeta = d.ganttMeta || {};
  checklist = d.checklist || JSON.parse(JSON.stringify(DEFAULT_CL));
  renderAll();
});

function switchView(v){
  currentView=v;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['calendar','gantt','checklist'][i]===v);
  });

}

  renderCalendar();
  if(currentView==='gantt')    renderGantt();
  if(currentView==='checklist')renderChecklist();
  renderNotes();
}

// ── Bar span math ────────────────────────────────────────────────
// startDayIdx, endDayIdx: 0=Mon … 6=Sun
function spanPct(s,e){
  const left = FRACS.slice(0,s).reduce((a,b)=>a+b,0)/FRACS_TOTAL*100;
  const w    = FRACS.slice(s,e+1).reduce((a,b)=>a+b,0)/FRACS_TOTAL*100;
  return {left,w};
}

// Build bars for a week — handles single-day, multi-day, and cross-week tasks
function buildBars(ws){
  const days=weekDays(ws);
  const wkS=ymd(days[0]);
  const wkE=ymd(days[6]);
  const bars=[];
  const seen=new Set();

  Object.entries(tasks).forEach(([k,arr])=>{
    (arr||[]).forEach((t,j)=>{
      const startStr=t.startDate||k;
      const endStr=t.endDate||startStr;
      if(endStr<wkS||startStr>wkE) return;
      const id=startStr+'|'+t.text+'|'+(t.owner||'');
      if(seen.has(id)) return;
      seen.add(id);
      const visStartStr=startStr<wkS?wkS:startStr;
      const visEndStr=endStr>wkE?wkE:endStr;
      const visStart=days.findIndex(d=>ymd(d)===visStartStr);
      const visEnd=days.findIndex(d=>ymd(d)===visEndStr);
      if(visStart<0||visEnd<0){
        console.warn('[buildBars] findIndex miss',{visStartStr,visEndStr,days:days.map(ymd),wkS,wkE});
        return;
      }
      bars.push({text:t.text,owner:t.owner||'',color:t.color||CHIPS[0],start:visStart,end:visEnd,startDate:startStr,endDate:endStr,storageKey:k,taskIdx:j});
    });
  });

  // Greedy lane assignment — non-overlapping bars share the same lane
  bars.sort((a,b)=>a.start-b.start);
  const laneEnd=[];
  bars.forEach(b=>{
    let lane=laneEnd.findIndex(e=>e<b.start);
    if(lane===-1) lane=laneEnd.length;
    b.lane=lane;
    laneEnd[lane]=b.end;
  });

  return bars;
}

// ── Move task (drag & drop) ───────────────────────────────────────
function moveTask(data,targetDay){
  const{storageKey,taskIdx,startDate,endDate}=data;
  const arr=tasks[storageKey];
  if(!arr||taskIdx>=arr.length) return;
  const task=arr[taskIdx];
  if(!task) return;
  const newStartStr=ymd(targetDay);
  let newEndStr=null;
  if(endDate&&endDate!==startDate){
    const spanDays=Math.round((parseYMD(endDate)-parseYMD(startDate))/86400000);
    if(spanDays>0) newEndStr=ymd(addDays(targetDay,spanDays));
  }
  arr.splice(taskIdx,1);
  const newKey=dKey(targetDay);
  if(!tasks[newKey]) tasks[newKey]=[];
  tasks[newKey].push({...task,startDate:newStartStr,endDate:newEndStr||null});
  save();
  renderCalendar();
  if(currentView==='gantt') renderGantt();
}

// ── Calendar ──────────────────────────────────────────────────────
function renderCalendar(){
  const wrap=document.getElementById('calWrap');
  wrap.innerHTML='';
  const weeks=allWeeks();
  const todayWS=ymd(weekMon(TODAY));
  const curIdx=weeks.findIndex(w=>ymd(w)===todayWS);
  const featWS=weeks[curIdx>=0?curIdx:0];

  // Global sticky day-name header (shown once, above all weeks)
  const globalHdr=makeGrid('cal-global-hdr');
  const wsHdrCell=document.createElement('div');wsHdrCell.className='ws-cell';wsHdrCell.style.cssText='background:#DBEAF4;border-right:1px solid #E5E9E7;height:36px';
  globalHdr.appendChild(wsHdrCell);
  const DAY_ABBR=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  weekDays(featWS).forEach((d,i)=>{
    const h=document.createElement('div');
    h.className='cal-day-name-hdr';
    if(sameDay(d,TODAY)) h.classList.add('is-today');
    if(isWE(d)) h.classList.add('is-weekend');
    h.innerHTML=`<span class="dname">${DAY_ABBR[i]}</span>`;
    globalHdr.appendChild(h);
  });
  const rHdr=document.createElement('div');rHdr.className='remarks-hdr';rHdr.style.cssText='height:36px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#589992;letter-spacing:.1em;text-transform:uppercase;background:#ECF3F8;border-left:1px solid #E5E9E7';rHdr.textContent='Remarks';
  globalHdr.appendChild(rHdr);
  wrap.appendChild(globalHdr);

  // Featured week
  wrap.appendChild(makeFeatured(featWS));

  // Future weeks
  const future=weeks.filter((_,i)=>i>curIdx);
  if(future.length){
    const sec=document.createElement('div');
    future.forEach((w,i)=>sec.appendChild(makeMiniWeek(w,false,i)));
    wrap.appendChild(sec);
  }

  // Past weeks
  const past=weeks.filter((_,i)=>i<curIdx).reverse();
  if(past.length){
    const sec=document.createElement('div');sec.className='past-section';
    past.forEach((w,i)=>sec.appendChild(makeMiniWeek(w,true,i)));
    wrap.appendChild(sec);
  }

  renderNotes();
}

function makeGrid(cls){
  const el=document.createElement('div');
  el.className=(cls?cls+' ':'')+'GRID';
  el.style.display='grid';
  el.style.gridTemplateColumns=GRID_TPL;
  return el;
}

function makeWsCell(ws){
  const el=document.createElement('div');el.className='ws-cell';
  el.innerHTML=`<span class="ws-label">WS</span><span class="ws-date">${MON_NAMES[ws.getMonth()]} ${ws.getDate()}</span>`;
  return el;
}

function makeDayHdr(d,i){
  const el=document.createElement('div');el.className='day-header-cell';
  if(sameDay(d,TODAY)) el.classList.add('is-today');
  el.innerHTML=`<span class="dname">${DAY_NAMES[i]}</span><span class="dnum">${d.getDate()}</span>`;
  return el;
}

function makeRemarksHdr(){
  const el=document.createElement('div');el.className='remarks-hdr';el.textContent='Remarks';return el;
}

function makeFeatured(ws){
  const card=document.createElement('div');
  card.className='week-card wc-green';
  const days=weekDays(ws);
  const wk=wKey(ws);

  const drow=makeGrid();
  drow.className='mini-row GRID';
  drow.style.display='grid';
  drow.style.gridTemplateColumns=GRID_TPL;
  drow.style.position='relative';
  drow.style.overflow='hidden';

  const wsSp=makeWsCell(ws);
  drow.appendChild(wsSp);

  const bars=buildBars(ws);
  const maxLane=bars.length?Math.max(...bars.map(b=>b.lane||0)):0;
  const rowH=Math.max(130,26+(maxLane+1)*36+6);

  days.forEach(d=>{
    const cell=document.createElement('div');cell.className='mini-day-cell';
    cell.style.height=rowH+'px';
    if(sameDay(d,TODAY)) cell.classList.add('is-today');
    else if(isWE(d)) cell.classList.add('is-weekend');
    cell.innerHTML=`<span class="cell-date">${d.getDate()}</span>`;
    cell.addEventListener('click',()=>openModal(d));
    cell.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';cell.classList.add('drag-over');});
    cell.addEventListener('dragleave',()=>cell.classList.remove('drag-over'));
    cell.addEventListener('drop',e=>{e.preventDefault();cell.classList.remove('drag-over');try{moveTask(JSON.parse(e.dataTransfer.getData('application/x-task')),d);}catch(err){console.error('Drop error',err);}});
    drow.appendChild(cell);
  });

  const ml=document.createElement('div');
  ml.style.cssText=`position:absolute;left:88px;right:220px;top:22px;height:${rowH-24}px;overflow:hidden;pointer-events:none`;
  buildMiniLanes(ml,ws,bars);
  drow.appendChild(ml);

  const rc=document.createElement('div');rc.className='mini-remarks-cell';
  rc.style.height=rowH+'px';
  const rta=document.createElement('textarea');rta.value=remarks[wk]||'';rta.placeholder='Remarks…';
  rta.addEventListener('input',()=>{remarks[wk]=rta.value;save();});
  rc.appendChild(rta);drow.appendChild(rc);

  card.appendChild(drow);
  return card;
}



function makeMiniWeek(ws,isPast,idx){
  const card=document.createElement('div');
  const accents=['wc-teal','wc-lav','wc-green'];
  card.className='week-card '+(isPast?'wc-green':accents[(idx||0)%3]);
  const days=weekDays(ws);
  const wk=wKey(ws);

  // Day row
  const drow=makeGrid();
  drow.className='mini-row GRID';
  drow.style.display='grid';
  drow.style.gridTemplateColumns=GRID_TPL;
  drow.style.position='relative';
  drow.style.overflow='hidden';

  const wsSp=makeWsCell(ws);
  drow.appendChild(wsSp);

  const bars=buildBars(ws);
  const maxLane=bars.length?Math.max(...bars.map(b=>b.lane||0)):0;
  const rowH=Math.max(130,26+(maxLane+1)*36+6);

  days.forEach(d=>{
    const cell=document.createElement('div');cell.className='mini-day-cell';
    cell.style.height=rowH+'px';
    if(sameDay(d,TODAY)) cell.classList.add('is-today');
    else if(isWE(d)) cell.classList.add('is-weekend');
    else if(d<TODAY) cell.classList.add('is-past');
    cell.innerHTML=`<span class="cell-date">${d.getDate()}</span>`;
    cell.addEventListener('click',()=>openModal(d));
    cell.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';cell.classList.add('drag-over');});
    cell.addEventListener('dragleave',()=>cell.classList.remove('drag-over'));
    cell.addEventListener('drop',e=>{e.preventDefault();cell.classList.remove('drag-over');try{moveTask(JSON.parse(e.dataTransfer.getData('application/x-task')),d);}catch(err){console.error('Drop error',err);}});
    drow.appendChild(cell);
  });

  // Mini lanes
  const ml=document.createElement('div');
  ml.style.cssText=`position:absolute;left:88px;right:220px;top:22px;height:${rowH-24}px;overflow:hidden;pointer-events:none`;
  buildMiniLanes(ml,ws,bars);
  drow.appendChild(ml);

  // Remarks
  const rc=document.createElement('div');rc.className='mini-remarks-cell';
  rc.style.height=rowH+'px';
  const rta=document.createElement('textarea');rta.value=remarks[wk]||'';rta.placeholder='Remarks…';
  rta.addEventListener('input',()=>{remarks[wk]=rta.value;save();});
  rc.appendChild(rta);drow.appendChild(rc);
  card.appendChild(drow);
  return card;
}

function buildMiniLanes(el,ws,precomputedBars){
  el.innerHTML='';
  const bars=precomputedBars||buildBars(ws);
  bars.forEach((b,i)=>{
    const {left,w}=spanPct(b.start,b.end);
    const bar=document.createElement('div');bar.className='mini-bar';
    bar.style.cssText=`left:${left}%;width:${w}%;background:${b.color};top:${2+(b.lane||0)*36}px;pointer-events:auto`;
    bar.textContent=b.text+(b.owner?' · '+b.owner:'');
    bar.title=b.text+(b.owner?' ('+b.owner+')':'');
    bar.draggable=true;
    bar.addEventListener('dragstart',e=>{
      e.stopPropagation();
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('application/x-task',JSON.stringify({
        storageKey:b.storageKey,taskIdx:b.taskIdx,startDate:b.startDate,endDate:b.endDate||b.startDate
      }));
      setTimeout(()=>{bar.style.opacity='0.35';},0);
    });
    bar.addEventListener('dragend',()=>{bar.style.opacity='1';});
    bar.addEventListener('click',e=>{e.stopPropagation();openModal(addDays(ws,b.start));});
    el.appendChild(bar);
  });
}

// ── Modal ─────────────────────────────────────────────────────────
function openModal(d){
  activeDate=d;
  document.getElementById('modal-title').textContent=`${WDAY_FULL[d.getDay()]}, ${MON_FULL[d.getMonth()]} ${d.getDate()}`;
  renderModalList();
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('task-inp').focus(),50);
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  activeDate=null;
  document.getElementById('task-inp').value='';
  document.getElementById('owner-inp').selectedIndex=0;
}

function renderModalList(){
  const list=document.getElementById('modal-list');
  list.innerHTML='';
  if(!activeDate) return;
  const dateStr=ymd(activeDate);

  // Collect all tasks that cover this date (own-day tasks + spanning tasks from other days)
  const visible=[];
  const seen=new Set();
  Object.entries(tasks).forEach(([k,arr])=>{
    (arr||[]).forEach((t,i)=>{
      const sKey=t.startDate||k;
      const eKey=t.endDate||sKey;
      if(sKey<=dateStr&&dateStr<=eKey){
        const id=sKey+'|'+t.text+'|'+(t.owner||'');
        if(seen.has(id)) return;
        seen.add(id);
        visible.push({t,k,i});
      }
    });
  });

  if(!visible.length){
    const el=document.createElement('div');el.className='no-tasks-msg';el.textContent='No tasks yet — add one below';
    list.appendChild(el);return;
  }

  visible.forEach(({t,k,i})=>{
    const row=document.createElement('div');row.className='task-row';
    const dot=document.createElement('div');dot.className='color-dot';
    dot.style.cssText=`background:${t.color||CHIPS[0]};width:12px;height:12px;border-radius:50%;margin-top:3px;flex-shrink:0`;
    dot.title='Change color';
    dot.addEventListener('click',e=>{
      e.stopPropagation();
      document.querySelectorAll('.task-color-picker').forEach(p=>p.remove());
      const picker=document.createElement('div');picker.className='task-color-picker';
      CHIPS.forEach(c=>{
        const ch=document.createElement('div');
        ch.style.cssText=`width:18px;height:18px;border-radius:50%;background:${c};cursor:pointer;flex-shrink:0;border:2px solid ${c===(t.color||CHIPS[0])?'#333':'transparent'}`;
        ch.addEventListener('click',ev=>{
          ev.stopPropagation();
          const task=(tasks[k]||[])[i];
          if(task){task.color=c;save();renderModalList();renderCalendar();}
        });
        picker.appendChild(ch);
      });
      dot.appendChild(picker);
      setTimeout(()=>document.addEventListener('click',()=>picker.remove(),{once:true}),0);
    });
    const nameIn=document.createElement('input');nameIn.className='editable-field name-field';nameIn.type='text';nameIn.value=t.text;
    nameIn.addEventListener('blur',()=>{const task=(tasks[k]||[])[i];if(task){task.text=nameIn.value;save();renderCalendar();}});
    nameIn.addEventListener('keydown',e=>{if(e.key==='Enter')nameIn.blur();});
    const ownIn=document.createElement('select');ownIn.className='editable-field owner-field';
    ['','Chad','J','Josef','Joyce','Lish','Marj','OE Dev Team','Osh'].forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n||'Owner';ownIn.appendChild(o);});
    ownIn.value=t.owner||'';
    ownIn.addEventListener('change',()=>{const task=(tasks[k]||[])[i];if(task){task.owner=ownIn.value;save();renderCalendar();}});
    const sKey=t.startDate||k;
    const endIn=document.createElement('input');
    endIn.type='date';endIn.min=sKey;
    endIn.style.cssText='font-size:10px;padding:2px 4px;border:1px solid #ddd;border-radius:4px;color:#589992;width:118px;background:#f9fafb';
    endIn.title='End date';endIn.value=t.endDate||'';
    function applyEndDate(){
      const v=endIn.value;
      const task=(tasks[k]||[])[i];
      if(!task){return;}
      if(!task.startDate) task.startDate=sKey;
      task.endDate=(v&&v>=sKey)?v:null;
      if(!task.endDate) endIn.value='';
      save();renderCalendar();
    }
    endIn.addEventListener('input',applyEndDate);
    endIn.addEventListener('change',applyEndDate);
    const del=document.createElement('button');del.className='del-btn';del.textContent='✕';
    del.addEventListener('click',()=>{if(tasks[k]){tasks[k].splice(i,1);}save();renderModalList();renderCalendar();});
    row.append(dot,nameIn,ownIn,endIn,del);
    list.appendChild(row);
  });
}

function addTask(){
  if(!activeDate) return;
  const val=document.getElementById('task-inp').value.trim();
  if(!val) return;
  const owner=document.getElementById('owner-inp').value.trim();
  const k=dKey(activeDate);
  if(!tasks[k]) tasks[k]=[];
  tasks[k].push({text:val,owner,color:selColor,done:false,startDate:ymd(activeDate)});
  save();
  document.getElementById('task-inp').value='';
  document.getElementById('owner-inp').selectedIndex=0;
  document.getElementById('task-inp').focus();
  renderModalList();
  renderCalendar();
}

(function initCP(){

  CHIPS.forEach(c=>{
    const el=document.createElement('div');el.className='cpick'+(c===selColor?' sel':'');el.style.background=c;
    el.addEventListener('click',()=>{
      selColor=c;
      document.querySelectorAll('.cpick').forEach(x=>x.classList.remove('sel'));
      el.classList.add('sel');
    });
    cp.appendChild(el);
  });
})();

// ── Gantt ─────────────────────────────────────────────────────────
function renderGantt(){
  const wrap=document.getElementById('ganttWrap');
  wrap.innerHTML='';
  const table=document.createElement('table');table.className='gantt-table';

  // Build day list Jun15–Jul31
  const days=[];let d=new Date(START_DATE);
  while(d<=END_DATE){days.push(new Date(d));d.setDate(d.getDate()+1);}

  // Collect unique tasks (respecting startDate/endDate for multi-day tasks)
  const seen=new Set();const allBars=[];
  Object.entries(tasks).forEach(([k,arr])=>{
    (arr||[]).forEach(t=>{
      const key=t.text+'|'+(t.owner||'');
      if(!seen.has(key)){
        seen.add(key);
        allBars.push({
          text:t.text,owner:t.owner||'',color:t.color||CHIPS[0],
          startDate:t.startDate||k,endDate:t.endDate||(t.startDate||k)
        });
      }
    });
  });

  const thead=document.createElement('thead');
  // Row 1: sticky cols + month headers
  const r1=document.createElement('tr');
  const thT=document.createElement('th');thT.className='th-task';thT.rowSpan=3;thT.textContent='Task';r1.appendChild(thT);
  const thO=document.createElement('th');thO.className='th-owner';thO.rowSpan=3;thO.textContent='Owner';r1.appendChild(thO);
  const thS=document.createElement('th');thS.className='th-status';thS.rowSpan=3;thS.textContent='Status';r1.appendChild(thS);
  let junC=0,julC=0;
  days.forEach(dd=>{dd.getMonth()===5?junC++:julC++;});
  if(junC){const th=document.createElement('th');th.className='month-th';th.colSpan=junC;th.textContent='June 2026';r1.appendChild(th);}
  if(julC){const th=document.createElement('th');th.className='month-th';th.colSpan=julC;th.textContent='July 2026';r1.appendChild(th);}
  const thR=document.createElement('th');thR.rowSpan=3;thR.textContent='Remarks';thR.style.minWidth='180px';r1.appendChild(thR);
  thead.appendChild(r1);
  // Row 2: day numbers
  const r2=document.createElement('tr');
  days.forEach(dd=>{
    const th=document.createElement('th');th.className='day-num-th';
    if(isWE(dd)) th.classList.add('col-weekend');
    if(sameDay(dd,TODAY)) th.classList.add('col-today');
    th.textContent=dd.getDate();r2.appendChild(th);
  });
  thead.appendChild(r2);
  // Row 3: day initials
  const r3=document.createElement('tr');
  const DN=['S','M','T','W','T','F','S'];
  days.forEach(dd=>{
    const th=document.createElement('th');th.className='day-dn-th';
    if(isWE(dd)) th.classList.add('col-weekend');
    if(sameDay(dd,TODAY)) th.classList.add('col-today');
    th.textContent=DN[dd.getDay()];r3.appendChild(th);
  });
  thead.appendChild(r3);
  table.appendChild(thead);

  const tbody=document.createElement('tbody');
  allBars.forEach(bar=>{
    const key=bar.text+'|'+bar.owner;
    const _gm=ganttMeta[key]||{};const meta={status:'notstarted',remarks:'',..._gm};
    const tr=document.createElement('tr');
    const tdN=document.createElement('td');tdN.className='td-task';tdN.textContent=bar.text;tr.appendChild(tdN);
    const tdO=document.createElement('td');tdO.className='td-owner';tdO.textContent=bar.owner||'—';tr.appendChild(tdO);
    const tdS=document.createElement('td');tdS.className='td-status';
    const sel=document.createElement('select');sel.className='status-sel s-'+meta.status;
    [['notstarted','Not started'],['inprogress','In progress'],['completed','Completed'],['delayed','Delayed']].forEach(([v,l])=>{
      const o=document.createElement('option');o.value=v;o.textContent=l;if(v===meta.status)o.selected=true;sel.appendChild(o);
    });
    sel.addEventListener('change',()=>{
      if(!ganttMeta[key]) ganttMeta[key]={status:'notstarted',remarks:''};
      ganttMeta[key].status=sel.value;
      sel.className='status-sel s-'+sel.value;
      save();
    });
    tdS.appendChild(sel);tr.appendChild(tdS);
    days.forEach(dd=>{
      const td=document.createElement('td');td.className='td-day';
      if(isWE(dd)) td.classList.add('col-weekend');
      if(sameDay(dd,TODAY)) td.classList.add('col-today');
      const ds=ymd(dd);
      const has=ds>=bar.startDate&&ds<=bar.endDate;
      if(has){const b=document.createElement('div');b.className='gantt-bar';b.style.background=bar.color;td.appendChild(b);}
      tr.appendChild(td);
    });
    const tdR=document.createElement('td');tdR.className='td-remarks';
    const rta=document.createElement('textarea');rta.value=meta.remarks||'';rta.placeholder='Remarks…';
    rta.addEventListener('input',()=>{
      if(!ganttMeta[key]) ganttMeta[key]={status:'notstarted',remarks:''};
      ganttMeta[key].remarks=rta.value;save();
    });
    tdR.appendChild(rta);tr.appendChild(tdR);
    tbody.appendChild(tr);
  });
  if(!allBars.length){
    const tr=document.createElement('tr');
    const td=document.createElement('td');td.colSpan=days.length+4;
    td.style.cssText='text-align:center;padding:40px;color:#aaa;font-style:italic';
    td.textContent='Add tasks in Calendar View — they will appear here';
    tr.appendChild(td);tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  wrap.appendChild(table);
}

// ── Checklist ─────────────────────────────────────────────────────
function renderChecklist(){
  const wrap=document.getElementById('clWrap');
  wrap.innerHTML='';
  if(!checklist) checklist=JSON.parse(JSON.stringify(DEFAULT_CL));

  // Title
  const ti=document.createElement('input');ti.className='cl-title-input';ti.type='text';ti.value=checklist.title||'';
  ti.addEventListener('blur',()=>{checklist.title=ti.value;save();});
  ti.addEventListener('keydown',e=>{if(e.key==='Enter')ti.blur();});
  wrap.appendChild(ti);

  // Progress
  let total=0,done=0;
  (checklist.sections||[]).forEach(s=>s.items.forEach(it=>{total++;if(it.done)done++;}));
  const pct=total?Math.round(done/total*100):0;
  const prog=document.createElement('div');prog.className='cl-progress';
  prog.innerHTML=`<div class="progress-outer"><div class="progress-inner" style="width:${pct}%"></div></div><div class="progress-txt">${done}/${total} complete (${pct}%)</div>`;
  wrap.appendChild(prog);

  // Sections
  (checklist.sections||[]).forEach((sec,si)=>{
    const secEl=document.createElement('div');secEl.className='cl-section';
    const hdr=document.createElement('div');hdr.className='cl-sec-hdr';
    const stIn=document.createElement('input');stIn.className='cl-sec-title';stIn.type='text';stIn.value=sec.title;
    stIn.addEventListener('blur',()=>{checklist.sections[si].title=stIn.value;save();});
    stIn.addEventListener('keydown',e=>{if(e.key==='Enter')stIn.blur();});
    const delSec=document.createElement('button');delSec.className='btn-del-sec';delSec.textContent='✕';
    delSec.addEventListener('click',()=>{checklist.sections.splice(si,1);save();renderChecklist();});
    hdr.append(stIn,delSec);secEl.appendChild(hdr);

    (sec.items||[]).forEach((item,ii)=>{
      const row=document.createElement('div');row.className='cl-item'+(item.done?' done':'');
      const cb=document.createElement('input');cb.type='checkbox';cb.checked=item.done;
      cb.addEventListener('change',()=>{checklist.sections[si].items[ii].done=cb.checked;save();renderChecklist();});
      const ta=document.createElement('textarea');ta.className='cl-item-text';ta.value=item.text;ta.rows=1;
      function resize(){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}
      ta.addEventListener('input',()=>{resize();checklist.sections[si].items[ii].text=ta.value;save();});
      ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ta.blur();}});
      setTimeout(resize,0);
      const del=document.createElement('button');del.className='btn-del-item';del.textContent='✕';
      del.addEventListener('click',()=>{checklist.sections[si].items.splice(ii,1);save();renderChecklist();});
      row.append(cb,ta,del);secEl.appendChild(row);
    });

    const addItem=document.createElement('button');addItem.className='btn-add-item';addItem.textContent='+ Add item';
    addItem.addEventListener('click',()=>{
      checklist.sections[si].items.push({text:'',done:false});save();renderChecklist();
      setTimeout(()=>{const rows=secEl.querySelectorAll('.cl-item-text');if(rows.length)rows[rows.length-1].focus();},50);
    });
    secEl.appendChild(addItem);
    wrap.appendChild(secEl);
  });

  const addSec=document.createElement('button');addSec.className='btn-add-section';addSec.textContent='+ Add section';
  addSec.addEventListener('click',()=>{checklist.sections.push({title:'New Section',items:[]});save();renderChecklist();});
  wrap.appendChild(addSec);
}

// ── Floating notes ────────────────────────────────────────────────
function renderNotes(){
  const layer=document.getElementById('notesLayer');
  layer.innerHTML='';
  notes.forEach((n,i)=>layer.appendChild(makeNote(n,i)));
}

function addNote(){
  notes.push({id:Date.now(),x:120,y:120,w:260,h:160,text:'',colorIdx:0});
  save();renderNotes();
}

function makeNote(n,idx){
  const nc=NOTE_COLORS[n.colorIdx||0];
  const el=document.createElement('div');el.className='float-note';
  el.style.cssText=`left:${n.x}px;top:${n.y}px;width:${n.w}px;height:${n.h}px;background:${nc.bg}`;

  const handle=document.createElement('div');handle.className='note-handle';handle.style.background=nc.bar;
  NOTE_COLORS.forEach((c,ci)=>{
    const sw=document.createElement('div');sw.className='note-swatch';
    sw.style.cssText=`background:${c.bg};border:2px solid ${c.bar}`;
    sw.addEventListener('click',e=>{e.stopPropagation();notes[idx].colorIdx=ci;save();renderNotes();});
    handle.appendChild(sw);
  });
  const xBtn=document.createElement('button');xBtn.className='note-close';xBtn.textContent='×';
  xBtn.addEventListener('click',e=>{e.stopPropagation();notes.splice(idx,1);save();renderNotes();});
  handle.appendChild(xBtn);
  el.appendChild(handle);

  const body=document.createElement('textarea');body.className='note-body';body.value=n.text||'';
  body.placeholder='Type a note…';body.style.background=nc.bg;
  body.addEventListener('input',()=>{notes[idx].text=body.value;save();});
  el.appendChild(body);

  const grip=document.createElement('div');grip.className='note-grip';el.appendChild(grip);

  // Drag
  let dragging=false,sx=0,sy=0,ex=0,ey=0;
  const onM=e=>{if(!dragging)return;notes[idx].x=ex+(e.clientX-sx);notes[idx].y=ey+(e.clientY-sy);el.style.left=notes[idx].x+'px';el.style.top=notes[idx].y+'px';};
  const onU=()=>{if(dragging){dragging=false;save();}document.removeEventListener('mousemove',onM);document.removeEventListener('mouseup',onU);};
  handle.addEventListener('mousedown',e=>{dragging=true;sx=e.clientX;sy=e.clientY;ex=notes[idx].x;ey=notes[idx].y;document.addEventListener('mousemove',onM);document.addEventListener('mouseup',onU);});

  // Resize
  let resizing=false,rx=0,ry=0,rw=0,rh=0;
  const onRM=e=>{if(!resizing)return;notes[idx].w=Math.max(180,rw+(e.clientX-rx));notes[idx].h=Math.max(100,rh+(e.clientY-ry));el.style.width=notes[idx].w+'px';el.style.height=notes[idx].h+'px';};
  const onRU=()=>{if(resizing){resizing=false;save();}document.removeEventListener('mousemove',onRM);document.removeEventListener('mouseup',onRU);};
  grip.addEventListener('mousedown',e=>{e.stopPropagation();resizing=true;rx=e.clientX;ry=e.clientY;rw=notes[idx].w;rh=notes[idx].h;document.addEventListener('mousemove',onRM);document.addEventListener('mouseup',onRU);});

  return el;
}

// ── Init ─────────────────────────────────────────────────────────
checklist=JSON.parse(JSON.stringify(DEFAULT_CL));
renderAll();
